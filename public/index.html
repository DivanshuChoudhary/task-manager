<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dockerized Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📝 Dockerized Task Manager</h1>

        <p class="subtitle">
            Manage your daily tasks efficiently
        </p>

        <div class="task-input">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task..."
            >

            <button id="addBtn">
                Add
            </button>

        </div>

        <div class="top-bar">

            <input
                type="text"
                id="searchTask"
                placeholder="🔍 Search Task"
            >

            <span id="taskCount">
                Total : 0
            </span>

        </div>

        <ul id="taskList"></ul>

        <p id="emptyMessage">
            🎉 No Tasks Available
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
